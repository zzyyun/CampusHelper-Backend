# CampusHelper-Backend Nginx 反向代理配置
# 作用：HTTPS 终止 + 反代到 gateway
# 证书：阿里云免费个人测试证书（手动上传到 ../certs/）
# 详细说明：docs/wechat-miniapp-launch-prd.md

# ===== 全局配置 =====
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── 基础 ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 10M;     # 文件上传 5MB + 余量
    charset utf-8;

    # ── 日志格式 ────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # ── Gzip 压缩 ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── SSL 协议与套件（TLS 1.2/1.3 强密码）─────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 223.5.5.5 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── 上游 keepalive（提升后端连接复用）──────────────────────────────
    upstream campus_gateway {
        server campus-gateway:50000 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # ===== HTTP server（强制 301 跳转 HTTPS）=====
    server {
        listen      80;
        listen      [::]:80;
        server_name rithupc.cn;

        # 微信校验文件不走 301（避免微信校验失败）
        location /.well-known/ {
            root /usr/share/nginx/html;
        }

        # 其他全部 301 → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS 主服务 =====
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name rithupc.cn;

        # ── 证书路径（阿里云免费证书，文件名见 PRD Appendix A.3）─────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── 安全响应头 ────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── 日志（client cert 可选）──────────────────────────────────
        access_log /var/log/nginx/rithupc.cn.access.log main;

        # ── 健康检查（用于 docker healthcheck）────────────────────────
        location = /health {
            access_log off;
            proxy_pass http://campus_gateway;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

        # ── 通用反代（覆盖所有业务接口）─────────────────────────────
        location / {
            proxy_pass         http://campus_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering       on;
            proxy_buffer_size     8k;
            proxy_buffers         8 16k;
        }

        # ── 错误页（友好 JSON）─────────────────────────────────────
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 502 '{"code":502,"message":"service unavailable"}';
        }
    }
}
