syntax = "proto3";

package pb;
option go_package = "/user_pb";

import "google/protobuf/timestamp.proto";
import "PB/common.proto";

service UserService{
  // 微信小程序专属登录
  rpc WxLogin (WxLoginRequest) returns (WxLoginResponse);

  // 用 Refresh Token 换取新 Access Token（前端在 access_token 过期后调用）
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);

  // 校园实名认证 & 绑定学校 (核心隔离字段)
  rpc BindCampus (BindCampusRequest) returns (pb.BaseResponse);

  // 获取当前用户信息(含学校信息)
  rpc GetCurrentUser (GetCurrentUserRequest) returns (UserInfo);

  // 更新用户信息（昵称、头像）
  rpc UpdateUserInfo (UpdateUserInfoRequest) returns (pb.BaseResponse);

  // 搜索/列出学校（供跨服务调用和前端选择学校）
  rpc ListSchools (ListSchoolsRequest) returns (ListSchoolsResponse);

  // ─── v2.0 管理员接口 ──────────────────────────────────────────────────────

  // 封禁用户（admin 封禁本校学生，super_admin 跨校）
  rpc BanUser (BanUserRequest) returns (pb.BaseResponse);

  // 解封用户（权限同上）
  rpc UnbanUser (UnbanUserRequest) returns (pb.BaseResponse);

  // 管理员查询用户列表（筛选 + 游标分页 + 搜索）
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);

  // 设置用户角色（仅 super_admin）
  rpc SetUserRole (SetUserRoleRequest) returns (pb.BaseResponse);

  // 获取待审核内容列表（调用 Content Service）
  rpc ListContentForAudit (ListContentForAuditRequest) returns (ListContentForAuditResponse);

  // 审核内容（通过 or 驳回，调用 Content Service）
  rpc AuditContent (AuditContentRequest) returns (pb.BaseResponse);
}

message WxLoginRequest {
  string js_code = 1; // 微信 wx.login() 获取的 code
}

message WxLoginResponse {
  string access_token = 1;
  bool is_bound_campus = 2;  // 标记是否已绑定学校，未绑定则前端强制跳转绑定页
  int64 school_id = 3;      // 已绑定的学校ID
  string refresh_token = 4; // 刷新令牌（默认 7 天），用于在 access_token 过期后换取新令牌
}

message RefreshTokenRequest {
  string refresh_token = 1; // 客户端持有的 Refresh Token
}

message RefreshTokenResponse {
  string access_token = 1;  // 续签后的新 Access Token（默认 24h）
  int64 school_id = 2;      // 用户当前学校ID（未绑定则为 0），供前端刷新本地缓存
  bool is_bound_campus = 3; // 同上
}

message BindCampusRequest {
  string school_name = 1;      // 选择的学校名称,根据传入的名称搜索对应的id绑定到用户
}

message GetCurrentUserRequest {
  int64 user_id = 1;
}

message UserInfo {
  int64 user_id = 1;
  string nickname = 2;
  string avatar_url = 3;
  int64 school_id = 4;     // 关键:所属学校ID（修复:int64 → uint64）
  string school_name = 5;   // 冗余学校名称，减少网关聚合调用
  string role = 7;          // student, admin, super_admin
  google.protobuf.Timestamp created_at = 8;
}

message UpdateUserInfoRequest {
  string nickname = 1;      // 新昵称（可选）
  string avatar_url = 2;    // 新头像URL（可选）
}

message ListSchoolsRequest {
  string keyword = 1;  // 模糊搜索关键字（可选，空=返回全部）
  int32 page_size = 2; // 每页数量（可选，默认 20，上限 50）
  string cursor = 3;   // 游标（可选）
}

message ListSchoolsResponse {
  repeated SchoolInfo schools = 1;
  bool has_more = 2;
  string next_cursor = 3;
}

message SchoolInfo {
  int64 school_id = 1;
  string name = 2;
  string province = 3;
}

// ─── v2.0 管理消息 ────────────────────────────────────────────────────────────

message BanUserRequest {
  int64 user_id = 1;    // 目标用户 ID
  int64 school_id = 2;  // 操作管理员所在学校（由 Gateway 注入）
  string reason = 3;    // 封禁原因
}

message UnbanUserRequest {
  int64 user_id = 1;
  int64 school_id = 2;
}

message ListUsersRequest {
  int64 school_id = 1;   // 学校筛选（admin 由 Gateway 注入；super_admin 可传 0=全部）
  int32 role = 2;        // 角色筛选（0=全部, 1=student, 2=admin, 3=super_admin）
  int32 status = 3;      // 状态筛选（0=全部, 1=normal, 2=banned, 3=deleted）
  string keyword = 4;    // nickname 模糊搜索（可选）
  int32 page_size = 5;   // 每页数量（默认 20，上限 100）
  string cursor = 6;     // 游标（Base64+JSON）
}

message ListUsersResponse {
  repeated UserInfo users = 1;
  bool has_more = 2;
  string next_cursor = 3;
}

message SetUserRoleRequest {
  int64 target_user_id = 1; // 目标用户 ID
  int32 role = 2;           // 目标角色（1=student, 2=admin；禁止设为 3=super_admin）
  int64 school_id = 3;      // 操作管理员所在学校
}

// ─── 内容审核 ─────────────────────────────────────────────────────────────────

message ListContentForAuditRequest {
  int64 school_id = 1;   // 学校筛选（admin 由 Gateway 注入）
  int32 page_size = 2;   // 每页数量（默认 20，上限 50）
  string cursor = 3;     // 游标
}

message ContentAuditItem {
  int64 content_id = 1;
  string title = 2;
  int64 author_id = 3;
  string author_name = 4;
  string content_type = 5;  // post / task
  int64 created_at = 6;     // unix seconds
}

message ListContentForAuditResponse {
  repeated ContentAuditItem items = 1;
  bool has_more = 2;
  string next_cursor = 3;
}

message AuditContentRequest {
  int64 content_id = 1;
  string action = 2;  // "approve" or "reject"
  string reason = 3;  // 审核意见（驳回时必填）
}

// protoc -I . --go_out=./PB/pb --go-grpc_out=./PB/pb ./PB/user.proto