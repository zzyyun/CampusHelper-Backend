syntax = "proto3";

package pb;
option go_package = "go_projects/praProject1/PB/pb/ai_moderation_pb";

import "google/protobuf/empty.proto";

// AIModerationService 提供本地 AI 内容审核能力（第 8 个微服务）。
//
// 设计要点：
//   - 同步单条审核：ModerateText（800ms 超时）
//   - 健康检查：HealthCheck（含模型加载状态）
//   - Result 枚举：PASS / REVIEW / BLOCK（与 internal/ai_moderation/model.go Result 一致）
//   - Status 枚举：SYNCED / DEGRADED / ASYNC（区分同步调用/降级/异步补判）
//
// 关联：
//   - PRD docs/ai-moderation-content-service-v3.0-prd.md
//   - Epic #89, Issue #91
service AIModerationService {
  // 同步单条文本审核（Content Service.CreatePost 路径同步调用）
  rpc ModerateText (ModerateTextRequest) returns (ModerateTextResponse);

  // 健康检查（grpc_health_v1 标准接口之外，额外提供业务级 health 检查）
  rpc HealthCheck (google.protobuf.Empty) returns (HealthCheckResponse);
}

// ─── ModerateText ─────────────────────────────────────────────────────────────

message ModerateTextRequest {
  string text = 1;       // 待审核文本（≤ 1000 字，超过会在 ai-moderation 侧截断到 512 token）
  string trace_id = 2;   // 调用方传入的 trace_id（用于 Jaeger 关联）
  int64 post_id = 3;     // 帖子 ID（用于 ai_audit_logs 审计）
}

message ModerateTextResponse {
  // Result AI 决策结果
  enum Result {
    PASS = 0;   // 内容正常，放行
    REVIEW = 1; // AI 不确定，进人工池
    BLOCK = 2;  // 内容违规，拦截
  }

  // Status 调用状态（区分同步/降级/异步）
  enum Status {
    SYNCED = 0;   // 正常同步调用
    DEGRADED = 1; // AI 服务降级（不可用/超时/熔断）
    ASYNC = 2;    // 异步补判调用
  }

  Result result = 1;
  Status status = 7;
  float confidence = 2;     // 0.0 - 1.0
  repeated string categories = 3; // 命中类别（如 ["涉政", "广告引流"]）
  int64 latency_ms = 4;
  string model_version = 5;
  bool fallback_used = 6;   // true 表示走了降级逻辑（mock 或 fallback）
}

// ─── HealthCheck ──────────────────────────────────────────────────────────────

message HealthCheckResponse {
  enum ServingStatus {
    SERVING = 0;
    NOT_SERVING = 1;
  }

  ServingStatus status = 1;
  bool model_loaded = 2;             // ONNX 模型是否加载成功
  string model_version = 3;          // 当前模型版本
  int64 model_load_timestamp = 4;    // 模型加载时间（Unix 秒）
  string mode = 5;                   // "mock" 或 "onnxruntime"
  int32 intra_op_threads = 6;        // ONNX 内部线程数
}