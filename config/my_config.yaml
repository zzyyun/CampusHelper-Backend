mysql:
  username: "root"
  password: "123456"
  host: "127.0.0.1"
  port: "3306"
  userDatabase: "campus_user"
  contentDatabase: "campus_content"
  charset: "utf8mb4"
  driver: "mysql"
  # 多服务数据库映射（每个微服务一个独立数据库，符合微服务架构）
  # key: 服务名（user/content/task/message/admin/file），value: 数据库名
  databases:
    user: "campus_user"
    content: "campus_content"
    message: "campus_message"
    task: "campus_task"
    file: "campus_file"

redis:
  username: ""
  password: "123456"
  address: "127.0.0.1:6379"

jwt:
  authKey: "campus_help_secret_2026"
  accessExpireH: 24
  refreshExpireH: 168

rabbitmq:
  username: "yun"
  password: "123456"
  address: "localhost:5672"

# Elasticsearch 节点地址（用于 Content Service 帖子索引与搜索）
elasticsearch:
  addresses:
    - "http://127.0.0.1:9200"
  index: "campus_posts"

etcd:
  address:
    - "127.0.0.1:2379"

# Jaeger OTLP HTTP endpoint (Jaeger >= 1.35 默认开启 4318)
jaeger:
  endpoint: "127.0.0.1:4318"

# File Service 配置（MinIO 对象存储）
file:
  minio:
    endpoint: "127.0.0.1:9000"
    accessKey: "minio"
    secretKey: "minio123"
    bucket: "campus-files"
    useSSL: false
    publicEndpoint: "http://127.0.0.1:9000"
  maxSizeMB: 5
  allowedTypes:
    - "image/jpeg"
    - "image/png"
    - "image/webp"

wechat:
  appId: "wxa782f10bddd49b38"
  appSecret: "bed491834c49bbf9bfd66387936f176e"

gateway:
  address: "0.0.0.0:50000"
  rateLimit: 100
  rateBurst: 200

service:
  user:
    name: "user-service"
    address: "127.0.0.1:50001"
    loadBalance: false
  content:
    name: "content-service"
    address: "127.0.0.1:50002"
    loadBalance: true
  message:
    name: "message-service"
    address: "127.0.0.1:50004"
    loadBalance: false
  task:
    name: "task-service"
    address: "127.0.0.1:50003"
    loadBalance: false
  file:
    name: "file-service"
    address: "127.0.0.1:50005"
    loadBalance: false
  ai-moderation:
    name: "ai-moderation"
    address: "127.0.0.1:50061"
    loadBalance: false

# AI Moderation 服务配置（v3.0 智能审核）
aiModeration:
  modelPath: "/models/moderation_v1.onnx"
  modelVersion: "v1.0-mock"
  modelHash: ""
  enabled: false  # mock 模式（true=真实 ONNX 推理, false=固定返回 PASS）
  timeoutMs: 800
  syncTimeoutMs: 800
  intraOpNumThreads: 4
  enableCpuMemArena: true